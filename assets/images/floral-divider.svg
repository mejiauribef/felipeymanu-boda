<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50" fill="none">
  <!-- Left branch -->
  <path d="M150 25 C130 20, 90 18, 50 22" stroke="#D4B5A0" stroke-width="1" fill="none"/>
  <!-- Right branch -->
  <path d="M150 25 C170 20, 210 18, 250 22" stroke="#D4B5A0" stroke-width="1" fill="none"/>
  <!-- Leaves left -->
  <ellipse cx="80" cy="19" rx="8" ry="4" transform="rotate(-15 80 19)" fill="white" opacity="0.4"/>
  <ellipse cx="105" cy="18" rx="7" ry="3.5" transform="rotate(-10 105 18)" fill="white" opacity="0.35"/>
  <ellipse cx="60" cy="21" rx="7" ry="3.5" transform="rotate(-20 60 21)" fill="white" opacity="0.3"/>
  <!-- Leaves right -->
  <ellipse cx="220" cy="19" rx="8" ry="4" transform="rotate(15 220 19)" fill="white" opacity="0.4"/>
  <ellipse cx="195" cy="18" rx="7" ry="3.5" transform="rotate(10 195 18)" fill="white" opacity="0.35"/>
  <ellipse cx="240" cy="21" rx="7" ry="3.5" transform="rotate(20 240 21)" fill="white" opacity="0.3"/>
  <!-- Center flower -->
  <circle cx="150" cy="22" r="2" fill="white" opacity="0.6"/>
  <ellipse cx="150" cy="16" rx="5" ry="8" fill="white" opacity="0.25"/>
  <ellipse cx="145" cy="20" rx="5" ry="8" transform="rotate(72 145 20)" fill="white" opacity="0.25"/>
  <ellipse cx="147" cy="27" rx="5" ry="8" transform="rotate(144 147 27)" fill="white" opacity="0.25"/>
  <ellipse cx="153" cy="27" rx="5" ry="8" transform="rotate(216 153 27)" fill="white" opacity="0.25"/>
  <ellipse cx="155" cy="20" rx="5" ry="8" transform="rotate(288 155 20)" fill="white" opacity="0.25"/>
  <!-- Buds -->
  <circle cx="120" cy="18" r="3" fill="white" opacity="0.35"/>
  <circle cx="120" cy="18" r="1.2" fill="#C9A87C" opacity="0.3"/>
  <circle cx="180" cy="18" r="3" fill="white" opacity="0.35"/>
  <circle cx="180" cy="18" r="1.2" fill="#C9A87C" opacity="0.3"/>
</svg>
